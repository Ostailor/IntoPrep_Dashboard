name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - desktop-v*

permissions:
  contents: write

jobs:
  build-installers:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: windows-latest
            args: ""
            rust_targets: default

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        if: ${{ matrix.rust_targets != 'default' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Setup Rust default target
        if: ${{ matrix.rust_targets == 'default' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Prepare desktop runtime config
        env:
          DESKTOP_APP_URL: ${{ secrets.PRODUCTION_URL }}
        run: npm run desktop:prepare

      - name: Build desktop installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }} --config src-tauri/tauri.desktop.conf.json
          releaseName: IntoPrep Desktop v__VERSION__
          releaseBody: |
            Desktop wrapper for the live IntoPrep Admin Portal.

            This shell points at the production portal, so normal web releases update the in-app experience without a new installer unless the native shell changes.
          releaseDraft: true
          prerelease: false
          tagName: desktop-v__VERSION__
